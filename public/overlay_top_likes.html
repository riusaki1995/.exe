<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Overlay - Top Likes</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800;900&display=swap');

        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Inter', system-ui, sans-serif;
            color: #fff;
            background: transparent;
        }

        .widget-container {
            width: 920px;
            max-width: 96vw;
            padding: 0;
            cursor: pointer;
        }

        .user-list {
            display: flex;
            flex-direction: column;
            gap: 0;
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.35);
        }

        .user-item {
            display: grid;
            grid-template-columns: 88px 100px minmax(0, 1fr) minmax(140px, auto);
            align-items: center;
            gap: 0 16px;
            padding: 14px 18px 14px 12px;
            background: rgba(12, 28, 38, 0.82);
            border-bottom: 1px solid rgba(255, 255, 255, 0.07);
            transition: background 0.2s ease;
        }

        .user-item:last-child {
            border-bottom: none;
        }

        .user-item:hover {
            background: rgba(18, 42, 56, 0.9);
        }

        /* Columna ranking */
        .rank-cell {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 72px;
            border-right: 1px solid rgba(255, 255, 255, 0.12);
            padding-right: 8px;
        }

        .rank-num {
            font-size: 40px;
            font-weight: 800;
            color: rgba(255, 255, 255, 0.92);
            letter-spacing: -0.02em;
        }

        .medal-wrap {
            width: 64px;
            height: 64px;
            filter: drop-shadow(0 2px 8px rgba(0, 0, 0, 0.45));
        }

        .medal-wrap svg {
            width: 100%;
            height: 100%;
            display: block;
        }

        .avatar {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid rgba(255, 255, 255, 0.25);
            box-shadow: 0 0 0 2px rgba(0, 0, 0, 0.2), 0 4px 14px rgba(0, 0, 0, 0.35);
        }

        .user-item[data-rank="1"] .avatar {
            border-color: #ffd54f;
            box-shadow: 0 0 0 2px rgba(255, 193, 7, 0.35), 0 0 20px rgba(255, 215, 0, 0.35);
        }

        .user-item[data-rank="2"] .avatar {
            border-color: #cfd8dc;
            box-shadow: 0 0 0 2px rgba(189, 189, 189, 0.4), 0 0 16px rgba(200, 200, 220, 0.25);
        }

        .user-item[data-rank="3"] .avatar {
            border-color: #ffab73;
            box-shadow: 0 0 0 2px rgba(205, 127, 50, 0.35), 0 0 16px rgba(205, 127, 50, 0.25);
        }

        /* Nombre: arcoíris animado */
        .username {
            font-weight: 800;
            font-size: 32px;
            line-height: 1.2;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            padding: 4px 0;
            background: linear-gradient(
                90deg,
                #ff006e,
                #8338ec,
                #3a86ff,
                #06ffa5,
                #ffbe0b,
                #fb5607,
                #ff006e
            );
            background-size: 220% auto;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 12px rgba(168, 85, 247, 0.45)) drop-shadow(0 2px 4px rgba(0, 0, 0, 0.8));
            animation: rainbow-flow 5s linear infinite;
        }

        @keyframes rainbow-flow {
            0% { background-position: 0% center; }
            100% { background-position: 200% center; }
        }

        /* Likes: corazón + número (espacio para cifras grandes) */
        .likes-cell {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 10px;
            min-width: 0;
            padding-left: 8px;
        }

        .likes-heart {
            font-size: 28px;
            line-height: 1;
            filter: drop-shadow(0 0 6px rgba(255, 75, 75, 0.6));
        }

        .likes-count {
            font-size: 34px;
            font-weight: 900;
            color: #fff;
            letter-spacing: -0.02em;
            white-space: nowrap;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
            font-variant-numeric: tabular-nums;
        }
    </style>
</head>
<body>

    <div class="widget-container" id="btn-prueba" title="Clic en el ranking para simular likes de prueba">
        <div class="user-list" id="lista-likes"></div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/js/overlay_room.js?v=1"></script>
    <script>
        const socket = io();
        const params = new URLSearchParams(window.location.search);
        const streamerId = params.get('user');
        const isPreviewEmbed = params.get('preview_embed') === '1';

        let maxRows = Math.min(15, Math.max(3, parseInt(params.get('rows') || '5', 10) || 5));

        if (streamerId) {
            setupOverlaySocketRoom(socket, streamerId);
            console.log('Top likes: canal ' + streamerId);
        } else if (!isPreviewEmbed) {
            console.warn('Top likes: falta ?user= en la URL');
        }

        let topLikers = {};
        /** Último totalLikeCount de TikTok por viewer (acumulado en directo). */
        let lastTotalLikeByUser = {};

        function canonicalLikeUserId(data) {
            const raw = data.uniqueId || (data.user && data.user.uniqueId) || data.userId || '';
            const s = String(raw).trim().toLowerCase();
            return s || 'usuario_oculto';
        }

        /**
         * Cuántos likes suma ESTE evento. Prioriza likeCount; si viene 0 o vacío, usa el salto en totalLikeCount.
         * Así no perdemos lotes (antes caía en +1 y el total quedaba corto).
         */
        function likeDeltaFromEvent(data, userId) {
            const uid = userId;
            const batch = Math.floor(Number(data.likeCount));
            const hasBatch = Number.isFinite(batch) && batch > 0;
            const total = data.totalLikeCount != null ? Number(data.totalLikeCount) : NaN;

            if (hasBatch) {
                if (Number.isFinite(total) && total >= 0) lastTotalLikeByUser[uid] = total;
                return batch;
            }

            if (Number.isFinite(total) && total >= 0) {
                const prev = lastTotalLikeByUser[uid];
                if (prev != null && total > prev) {
                    lastTotalLikeByUser[uid] = total;
                    return total - prev;
                }
                if (prev == null) {
                    lastTotalLikeByUser[uid] = total;
                    return total > 0 ? total : 0;
                }
            }
            return 0;
        }

        /** Igual que overlay_hypebar: el total real sube en lote; el número mostrado sube de 1 en 1. */
        let likeAnimTimer = null;
        const LIKE_TICK_MS = 20;

        function ensureLikesDisplay(u) {
            if (u.likesDisplay == null) u.likesDisplay = u.likes || 0;
        }

        function pumpLikesDisplay() {
            let moved = false;
            Object.keys(topLikers).forEach(function (id) {
                const u = topLikers[id];
                ensureLikesDisplay(u);
                const gap = (u.likes || 0) - u.likesDisplay;
                if (gap <= 0) return;
                const perTick = gap > 100 ? Math.min(6, Math.ceil(gap / 45)) : 1;
                for (let i = 0; i < perTick && u.likesDisplay < u.likes; i++) {
                    u.likesDisplay++;
                    moved = true;
                }
            });
            if (moved) actualizarUI();
            let pending = false;
            Object.keys(topLikers).forEach(function (id) {
                const u = topLikers[id];
                ensureLikesDisplay(u);
                if ((u.likes || 0) > u.likesDisplay) pending = true;
            });
            if (!pending && likeAnimTimer) {
                clearInterval(likeAnimTimer);
                likeAnimTimer = null;
            }
        }

        function scheduleLikesTick() {
            if (!likeAnimTimer) {
                likeAnimTimer = setInterval(pumpLikesDisplay, LIKE_TICK_MS);
            }
            pumpLikesDisplay();
        }

        function applyRowsFromConfig(n) {
            const v = parseInt(n, 10);
            if (isNaN(v)) return;
            maxRows = Math.min(15, Math.max(3, v));
        }

        function limpiarNombreMostrar(raw) {
            if (raw == null || raw === '') return 'Usuario';
            let s = String(raw).trim();
            s = s.replace(/^@+/, '');
            return s || 'Usuario';
        }

        function medalSvg(place, uid) {
            const safe = String(uid || 'x').replace(/\W/g, '').slice(0, 12) || 'x';
            const id = 'g' + place + '-' + safe;
            if (place === 1) {
                return `<div class="medal-wrap" aria-hidden="true"><svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
                    <defs><linearGradient id="${id}a" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#fffde7"/><stop offset="40%" stop-color="#ffc107"/><stop offset="100%" stop-color="#ff8f00"/>
                    </linearGradient></defs>
                    <circle cx="40" cy="40" r="34" fill="url(#${id}a)" stroke="#b8860b" stroke-width="2.5"/>
                    <text x="40" y="52" text-anchor="middle" font-size="30" font-weight="900" font-family="Inter,sans-serif" fill="#4e342e">1</text>
                </svg></div>`;
            }
            if (place === 2) {
                return `<div class="medal-wrap" aria-hidden="true"><svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
                    <defs><linearGradient id="${id}b" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#fafafa"/><stop offset="50%" stop-color="#b0bec5"/><stop offset="100%" stop-color="#78909c"/>
                    </linearGradient></defs>
                    <circle cx="40" cy="40" r="34" fill="url(#${id}b)" stroke="#607d8b" stroke-width="2.5"/>
                    <text x="40" y="52" text-anchor="middle" font-size="30" font-weight="900" font-family="Inter,sans-serif" fill="#37474f">2</text>
                </svg></div>`;
            }
            return `<div class="medal-wrap" aria-hidden="true"><svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
                <defs><linearGradient id="${id}c" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#ffe0b2"/><stop offset="45%" stop-color="#cd7f32"/><stop offset="100%" stop-color="#5d4037"/>
                </linearGradient></defs>
                <circle cx="40" cy="40" r="34" fill="url(#${id}c)" stroke="#6d4c41" stroke-width="2.5"/>
                <text x="40" y="52" text-anchor="middle" font-size="30" font-weight="900" font-family="Inter,sans-serif" fill="#3e2723">3</text>
            </svg></div>`;
        }

        function actualizarUI() {
            const arrayLikers = Object.values(topLikers).sort((a, b) => b.likes - a.likes);
            const contenedor = document.getElementById('lista-likes');
            contenedor.innerHTML = '';

            const top5 = arrayLikers.slice(0, maxRows);

            top5.forEach((user, index) => {
                const rank = index + 1;
                const rankHtml = rank <= 3
                    ? medalSvg(rank, user.id || user.name || 'u' + index)
                    : `<span class="rank-num">${rank}.</span>`;

                const div = document.createElement('div');
                div.className = 'user-item';
                div.dataset.rank = String(rank);
                const nombreSeguro = limpiarNombreMostrar(user.name);
                div.innerHTML = `
                    <div class="rank-cell">${rankHtml}</div>
                    <img class="avatar" alt="" src="">
                    <span class="username"></span>
                    <div class="likes-cell">
                        <span class="likes-heart" aria-hidden="true">❤️</span>
                        <span class="likes-count">${(user.likesDisplay != null ? user.likesDisplay : user.likes).toLocaleString()}</span>
                    </div>
                `;
                const img = div.querySelector('.avatar');
                img.src = user.pic;
                img.onerror = function () {
                    this.onerror = null;
                    this.src = 'https://cdn.pixabay.com/photo/2015/10/05/22/37/blank-profile-picture-973460_960_720.png';
                };
                const nameEl = div.querySelector('.username');
                nameEl.textContent = nombreSeguro;
                nameEl.title = nombreSeguro;
                contenedor.appendChild(div);
            });
        }

        function procesarLike(data) {
            const userId = canonicalLikeUserId(data);
            const likesNuevos = likeDeltaFromEvent(data, userId);
            if (likesNuevos <= 0) return;

            const foto = data.profilePictureUrl || (data.user && data.user.profilePictureUrl) ||
                'https://cdn.pixabay.com/photo/2015/10/05/22/37/blank-profile-picture-973460_960_720.png';
            const nick = data.nickname || (data.user && data.user.nickname) || userId;

            if (!topLikers[userId]) {
                topLikers[userId] = { id: userId, name: nick, likes: 0, likesDisplay: 0, pic: foto };
            }

            topLikers[userId].likes += likesNuevos;
            ensureLikesDisplay(topLikers[userId]);
            topLikers[userId].pic = foto;
            if (nick && nick !== userId) topLikers[userId].name = nick;

            scheduleLikesTick();
            actualizarUI();
        }

        socket.on('like', (data) => {
            if (isPreviewEmbed) return;
            procesarLike(data);
        });

        socket.on('nuevo_live', () => {
            if (isPreviewEmbed) return;
            if (likeAnimTimer) {
                clearInterval(likeAnimTimer);
                likeAnimTimer = null;
            }
            lastTotalLikeByUser = {};
            topLikers = {};
            actualizarUI();
        });

        function seedPreviewLikes() {
            const names = ['PreviewFan', 'MariaFan', 'LuisPro', 'SofiaStar', 'Cazador', 'Neo', 'Kai', 'Luna', 'Alex', 'Sam', 'River', 'Jordan', 'Casey', 'Taylor', 'Morgan'];
            topLikers = {};
            for (let i = 0; i < maxRows; i++) {
                const id = 'preview_seed_' + i;
                const lv = 125760 - i * 4200;
                topLikers[id] = {
                    id: id,
                    name: names[i] || ('Usuario ' + (i + 1)),
                    likes: lv,
                    likesDisplay: lv,
                    pic: 'https://cdn.pixabay.com/photo/2015/10/05/22/37/blank-profile-picture-973460_960_720.png'
                };
            }
            actualizarUI();
        }

        const nombresPrueba = ['Leonardo', 'Cazador', 'MariaFan', 'LuisPro', 'SofiaStar'];
        document.getElementById('btn-prueba').addEventListener('click', () => {
            if (isPreviewEmbed) return;
            const randomUser = nombresPrueba[Math.floor(Math.random() * nombresPrueba.length)];
            const randomLikes = Math.floor(Math.random() * 80) + 1;
            procesarLike({
                uniqueId: randomUser,
                nickname: randomUser,
                likeCount: randomLikes,
                profilePictureUrl: 'https://cdn.pixabay.com/photo/2015/10/05/22/37/blank-profile-picture-973460_960_720.png'
            });
        });

        function applyRankingConfigPayload(kind, config) {
            if (kind !== 'toplikes' || !config) return;
            if (config.rows != null) applyRowsFromConfig(config.rows);
            if (isPreviewEmbed) seedPreviewLikes();
            else actualizarUI();
        }

        socket.on('ranking_overlay_config', (data) => {
            if (!data || data.kind !== 'toplikes' || !data.config) return;
            applyRankingConfigPayload(data.kind, data.config);
        });

        window.addEventListener('message', (event) => {
            const d = event && event.data;
            if (!d || typeof d !== 'object') return;
            if (d.type === 'ranking_config' && d.kind === 'toplikes' && d.config) {
                applyRankingConfigPayload('toplikes', d.config);
                return;
            }
            if (d.type !== 'overlay_test' || d.kind !== 'toplikes') return;
            if (isPreviewEmbed) {
                procesarLike({
                    uniqueId: 'preview_test_' + Date.now(),
                    nickname: '¡Prueba!',
                    likeCount: 88888,
                    profilePictureUrl: 'https://cdn.pixabay.com/photo/2015/10/05/22/37/blank-profile-picture-973460_960_720.png'
                });
                return;
            }
            procesarLike({
                uniqueId: 'preview_user',
                nickname: 'PreviewFan',
                likeCount: 125760,
                profilePictureUrl: 'https://cdn.pixabay.com/photo/2015/10/05/22/37/blank-profile-picture-973460_960_720.png'
            });
        });

        if (isPreviewEmbed) {
            requestAnimationFrame(function () {
                seedPreviewLikes();
            });
        }
    </script>
</body>
</html>
