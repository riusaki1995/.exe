<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="referrer" content="no-referrer">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Top 1 Donador</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Inter:wght@700;800&display=swap');

* { box-sizing: border-box; }
html, body {
    background: transparent;
    margin: 0;
    overflow: hidden;
    font-family: 'Inter', system-ui, sans-serif;
    width: 850px;
    height: 520px;
}

:root {
    --hc1: #22d3ee;
    --hc2: #06b6d4;
    --hc3: #2dd4bf;
    --ng1: #fffef5;
    --ng2: #ffe066;
    --ng3: #daa520;
    --vc: #e8e8ff;
    --vs: rgba(0, 0, 0, 0.85);
    --cc: #ffd700;
}

.stage {
    width: 850px;
    height: 520px;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 16px 20px 24px;
}

/* Cabecera tipo MVP (corona + título) */
.mvp-header {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 10px;
    max-width: 92%;
}

.mvp-header .crown-inline {
    width: 36px;
    height: 30px;
    flex-shrink: 0;
    filter: drop-shadow(0 2px 6px rgba(0,0,0,0.55));
}

.mvp-header-title {
    margin: 0;
    font-family: 'Inter', system-ui, sans-serif;
    font-weight: 800;
    font-size: 22px;
    letter-spacing: 0.02em;
    line-height: 1.15;
    text-align: center;
}

.mvp-header-title--rainbow {
    background: linear-gradient(
        92deg,
        #ff1744,
        #ff9100,
        #ffea00,
        #00e676,
        #00b0ff,
        #e040fb,
        #ff1744
    );
    background-size: 300% 100%;
    animation: title-rainbow 4.5s linear infinite;
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 2px 0 rgba(0, 0, 0, 0.5));
}

.mvp-header-title--gradient {
    background: linear-gradient(100deg, var(--hc1), var(--hc2), var(--hc3));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 2px 0 rgba(0, 0, 0, 0.45));
}

@keyframes title-rainbow {
    0% { background-position: 0% 50%; }
    100% { background-position: 100% 50%; }
}

body.no-header .mvp-header {
    display: none;
}

/* Columna principal */
.top-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 260px;
}

/* Área del retrato + órbita decorativa */
.orbit-stage {
    position: relative;
    width: 200px;
    height: 200px;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* Corona SVG sobre retrato */
.crown-wrap {
    position: absolute;
    top: -8px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 15;
    width: 56px;
    height: 44px;
    filter: drop-shadow(0 4px 8px rgba(0,0,0,0.5)) drop-shadow(0 0 12px rgba(255, 215, 0, 0.85));
    animation: crown-float 3s ease-in-out infinite;
}

body.no-crown .crown-wrap {
    display: none;
}

.crown-wrap svg {
    width: 100%;
    height: 100%;
    display: block;
}

@keyframes crown-float {
    0%, 100% { transform: translateX(-50%) translateY(0); }
    50% { transform: translateX(-50%) translateY(-3px); }
}

.portrait-stack {
    position: relative;
    z-index: 5;
    width: 128px;
    height: 128px;
    margin-top: 18px;
}

.aura {
    position: absolute;
    inset: -18px;
    border-radius: 50%;
    z-index: 0;
    pointer-events: none;
    background: conic-gradient(
        from 0deg,
        rgba(255, 220, 100, 0.45),
        rgba(0, 230, 255, 0.35),
        rgba(255, 140, 60, 0.4),
        rgba(255, 105, 180, 0.35),
        rgba(255, 220, 100, 0.45)
    );
    animation: aura-spin 8s linear infinite;
    filter: blur(10px);
    opacity: 0.95;
}

body.no-fx .aura {
    opacity: 0.35;
    animation: none;
}

.aura::after {
    content: '';
    position: absolute;
    inset: 6px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255, 230, 120, 0.5) 0%, transparent 65%);
    animation: aura-pulse 2.2s ease-in-out infinite;
}

body.no-fx .aura::after {
    animation: none;
}

@keyframes aura-spin {
    to { transform: rotate(360deg); }
}

@keyframes aura-pulse {
    0%, 100% { opacity: 0.65; transform: scale(0.92); }
    50% { opacity: 1; transform: scale(1.05); }
}

.gold-ring {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    padding: 5px;
    z-index: 3;
    background: linear-gradient(
        145deg,
        #fff8dc 0%,
        #ffd700 18%,
        #daa520 42%,
        #ffd700 58%,
        #b8860b 78%,
        #ffe55c 100%
    );
    box-shadow:
        0 0 0 1px rgba(139, 90, 0, 0.6),
        0 4px 16px rgba(0, 0, 0, 0.45),
        inset 0 2px 6px rgba(255, 255, 255, 0.45),
        inset 0 -3px 8px rgba(100, 60, 0, 0.35),
        0 0 24px rgba(255, 215, 0, 0.55);
    z-index: 2;
    animation: ring-shimmer 2.8s ease-in-out infinite;
}

body.no-fx .gold-ring {
    animation: none;
}

@keyframes ring-shimmer {
    0%, 100% {
        filter: brightness(1) saturate(1);
        box-shadow:
            0 0 0 1px rgba(139, 90, 0, 0.6),
            0 4px 16px rgba(0, 0, 0, 0.45),
            inset 0 2px 6px rgba(255, 255, 255, 0.45),
            inset 0 -3px 8px rgba(100, 60, 0, 0.35),
            0 0 28px rgba(255, 215, 0, 0.5);
    }
    50% {
        filter: brightness(1.12) saturate(1.15);
        box-shadow:
            0 0 0 1px rgba(139, 90, 0, 0.6),
            0 0 0 1px rgba(139, 90, 0, 0.6),
            0 4px 20px rgba(0, 0, 0, 0.5),
            inset 0 2px 8px rgba(255, 255, 255, 0.55),
            inset 0 -3px 8px rgba(100, 60, 0, 0.35),
            0 0 40px rgba(255, 230, 120, 0.75),
            0 0 60px rgba(0, 200, 255, 0.2);
    }
}

.avatar-inner {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    overflow: hidden;
    background: #0a1628;
    border: 2px solid rgba(30, 58, 95, 0.9);
    box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.6);
}

.avatar-inner img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
}

.spark {
    position: absolute;
    z-index: 8;
    width: 8px;
    height: 8px;
    background: #fff;
    clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
    filter: drop-shadow(0 0 4px #fff) drop-shadow(0 0 8px #ffd700);
    animation: spark-twinkle 1.6s ease-in-out infinite;
    pointer-events: none;
}

body.no-fx .spark { display: none; }

.spark.sa { top: 8%; left: 12%; animation-delay: 0s; }
.spark.sb { top: 22%; right: 6%; animation-delay: 0.3s; }
.spark.sc { bottom: 18%; left: 8%; animation-delay: 0.6s; }
.spark.sd { bottom: 12%; right: 14%; animation-delay: 0.15s; }
.spark.se { top: 42%; left: 0%; animation-delay: 0.45s; }
.spark.sf { top: 38%; right: 0%; animation-delay: 0.75s; }

@keyframes spark-twinkle {
    0%, 100% { opacity: 0.35; transform: scale(0.45); }
    50% { opacity: 1; transform: scale(0.95); }
}

.coin-float {
    position: absolute;
    z-index: 6;
    border-radius: 50%;
    background: radial-gradient(circle at 32% 28%, #fffef0 0%, #ffe066 25%, #ffd700 50%, #b8860b 85%, #6b4f00 100%);
    box-shadow:
        inset 0 -3px 6px rgba(0,0,0,0.35),
        inset 0 2px 4px rgba(255,255,255,0.5),
        0 4px 10px rgba(0,0,0,0.4),
        0 0 14px rgba(255, 215, 0, 0.6);
    animation: coin-drift 3.5s ease-in-out infinite;
    pointer-events: none;
}

body.no-fx .coin-float { display: none; }

.coin-float::after {
    content: '';
    position: absolute;
    inset: 18%;
    border-radius: 50%;
    border: 1.5px solid rgba(180, 120, 0, 0.5);
    box-shadow: inset 0 0 4px rgba(255,255,255,0.3);
}

.coin-float.c1 { width: 26px; height: 26px; top: 4%; left: 4%; animation-delay: 0s; }
.coin-float.c2 { width: 20px; height: 20px; top: 12%; right: 2%; animation-delay: -0.7s; animation-duration: 4s; }
.coin-float.c3 { width: 22px; height: 22px; bottom: 8%; left: 2%; animation-delay: -1.2s; animation-duration: 3.2s; }
.coin-float.c4 { width: 18px; height: 18px; bottom: 4%; right: 6%; animation-delay: -0.4s; animation-duration: 3.8s; }
.coin-float.c5 { width: 16px; height: 16px; top: 48%; left: -2%; animation-delay: -2s; animation-duration: 4.2s; }

@keyframes coin-drift {
    0%, 100% {
        transform: translate(0, 0) rotate(0deg) scale(1);
        filter: brightness(1) drop-shadow(0 0 6px rgba(255, 215, 0, 0.7));
    }
    25% {
        transform: translate(4px, -8px) rotate(12deg) scale(1.05);
        filter: brightness(1.15) drop-shadow(0 0 12px rgba(255, 230, 140, 0.95));
    }
    50% {
        transform: translate(-3px, 5px) rotate(-8deg) scale(0.98);
        filter: brightness(1.05) drop-shadow(0 0 8px rgba(255, 200, 80, 0.8));
    }
    75% {
        transform: translate(6px, 3px) rotate(6deg) scale(1.02);
        filter: brightness(1.2) drop-shadow(0 0 14px rgba(255, 255, 200, 1));
    }
}

.gem-float {
    position: absolute;
    z-index: 6;
    width: 14px;
    height: 18px;
    background: linear-gradient(135deg, #fff9e6 0%, #ffd700 35%, #ffec8b 55%, #daa520 100%);
    clip-path: polygon(50% 0%, 100% 38%, 82% 100%, 18% 100%, 0% 38%);
    box-shadow:
        0 0 10px rgba(255, 215, 0, 0.85),
        inset 0 0 6px rgba(255, 255, 255, 0.6);
    animation: gem-drift 2.8s ease-in-out infinite;
    pointer-events: none;
}

body.no-fx .gem-float { display: none; }

.gem-float.g1 { top: 28%; left: -4px; animation-delay: -0.5s; }
.gem-float.g2 { top: 20%; right: 10%; animation-delay: -1.1s; width: 12px; height: 15px; }
.gem-float.g3 { bottom: 28%; right: -2px; animation-delay: -0.2s; }
.gem-float.g4 { bottom: 22%; left: 14%; animation-delay: -1.6s; width: 11px; height: 14px; }

@keyframes gem-drift {
    0%, 100% {
        transform: translateY(0) rotate(-5deg) scale(1);
        opacity: 0.92;
        filter: brightness(1) drop-shadow(0 0 8px rgba(255, 215, 0, 0.9));
    }
    33% {
        transform: translateY(-10px) rotate(8deg) scale(1.08);
        opacity: 1;
        filter: brightness(1.25) drop-shadow(0 0 16px rgba(255, 255, 255, 0.9));
    }
    66% {
        transform: translateY(6px) rotate(-12deg) scale(0.95);
        opacity: 0.88;
        filter: brightness(1.1) drop-shadow(0 0 10px rgba(255, 180, 50, 0.85));
    }
}

.nombre {
    margin-top: 14px;
    font-family: 'Cinzel', 'Inter', serif;
    font-weight: 900;
    font-size: 17px;
    letter-spacing: 0.04em;
    text-align: center;
    max-width: 240px;
    line-height: 1.2;
    background: linear-gradient(180deg, var(--ng1) 0%, var(--ng2) 45%, var(--ng3) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 2px 3px rgba(0,0,0,0.95)) drop-shadow(0 0 12px rgba(255, 215, 0, 0.45));
    word-break: break-word;
}

.monedas {
    margin-top: 8px;
    color: var(--vc);
    font-weight: 800;
    font-size: 15px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    flex-wrap: wrap;
    text-shadow:
        0 2px 0 var(--vs),
        0 2px 6px rgba(0,0,0,0.9),
        0 0 14px rgba(100, 200, 255, 0.35);
}

.moneda {
    width: 20px;
    height: 20px;
    flex-shrink: 0;
}
</style>
</head>
<body>

<div class="stage">
    <header class="mvp-header" id="mvp-header">
        <div class="crown-inline" aria-hidden="true">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 100">
                <defs>
                    <linearGradient id="cg-h" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#fff8dc"/>
                        <stop offset="35%" stop-color="#ffd700"/>
                        <stop offset="70%" stop-color="#daa520"/>
                        <stop offset="100%" stop-color="#b8860b"/>
                    </linearGradient>
                </defs>
                <path fill="url(#cg-h)" stroke="#8b6914" stroke-width="1.2"
                    d="M60 8 L72 32 L98 18 L88 48 L112 52 L92 70 L96 94 L60 82 L24 94 L28 70 L8 52 L32 48 L22 18 L48 32 Z"/>
                <ellipse cx="32" cy="52" rx="7" ry="9" fill="#c41e3a" stroke="#5c0010" stroke-width="0.5"/>
                <ellipse cx="60" cy="58" rx="8" ry="10" fill="#dc143c" stroke="#5c0010" stroke-width="0.5"/>
                <ellipse cx="88" cy="52" rx="7" ry="9" fill="#c41e3a" stroke="#5c0010" stroke-width="0.5"/>
                <circle cx="60" cy="28" r="5" fill="#fffef0" stroke="#daa520" stroke-width="0.8"/>
            </svg>
        </div>
        <h1 class="mvp-header-title mvp-header-title--gradient" id="mvp-header-title">MVP: Top 1 Donador</h1>
    </header>

    <div class="top-wrap">
        <div class="orbit-stage" aria-hidden="true">
            <div class="coin-float c1"></div>
            <div class="coin-float c2"></div>
            <div class="coin-float c3"></div>
            <div class="coin-float c4"></div>
            <div class="coin-float c5"></div>
            <div class="gem-float g1"></div>
            <div class="gem-float g2"></div>
            <div class="gem-float g3"></div>
            <div class="gem-float g4"></div>
            <div class="spark sa"></div>
            <div class="spark sb"></div>
            <div class="spark sc"></div>
            <div class="spark sd"></div>
            <div class="spark se"></div>
            <div class="spark sf"></div>

            <div class="portrait-stack">
                <div class="aura"></div>
                <div class="gold-ring">
                    <div class="avatar-inner">
                        <img id="avatar" alt="">
                    </div>
                </div>
                <div class="crown-wrap">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 100" aria-hidden="true">
                        <defs>
                            <linearGradient id="cg" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" stop-color="#fff8dc"/>
                                <stop offset="35%" stop-color="#ffd700"/>
                                <stop offset="70%" stop-color="#daa520"/>
                                <stop offset="100%" stop-color="#b8860b"/>
                            </linearGradient>
                            <filter id="gs" x="-20%" y="-20%" width="140%" height="140%">
                                <feGaussianBlur in="SourceAlpha" stdDeviation="1.2" result="b"/>
                                <feOffset dx="0" dy="2" in="b" result="o"/>
                                <feMerge><feMergeNode in="o"/><feMergeNode in="SourceGraphic"/></feMerge>
                            </filter>
                        </defs>
                        <path fill="url(#cg)" stroke="#8b6914" stroke-width="1.2" filter="url(#gs)"
                            d="M60 8 L72 32 L98 18 L88 48 L112 52 L92 70 L96 94 L60 82 L24 94 L28 70 L8 52 L32 48 L22 18 L48 32 Z"/>
                        <ellipse cx="32" cy="52" rx="7" ry="9" fill="#c41e3a" stroke="#5c0010" stroke-width="0.5"/>
                        <ellipse cx="60" cy="58" rx="8" ry="10" fill="#dc143c" stroke="#5c0010" stroke-width="0.5"/>
                        <ellipse cx="88" cy="52" rx="7" ry="9" fill="#c41e3a" stroke="#5c0010" stroke-width="0.5"/>
                        <polygon points="24,38 28,44 20,44" fill="#e8e8ff" opacity="0.95"/>
                        <polygon points="60,42 64,50 56,50" fill="#f0f8ff" opacity="0.95"/>
                        <polygon points="96,38 100,44 92,44" fill="#e8e8ff" opacity="0.95"/>
                        <circle cx="60" cy="28" r="5" fill="#fffef0" stroke="#daa520" stroke-width="0.8"/>
                        <circle cx="38" cy="22" r="3.5" fill="#fffef0" stroke="#c9a227" stroke-width="0.6"/>
                        <circle cx="82" cy="22" r="3.5" fill="#fffef0" stroke="#c9a227" stroke-width="0.6"/>
                    </svg>
                </div>
            </div>
        </div>

        <div class="nombre" id="nombre">Esperando...</div>
        <div class="monedas" id="monedas"><span id="monedas-inner"></span></div>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="/js/overlay_room.js?v=1"></script>
<script>
const socket = io();
const params = new URLSearchParams(window.location.search);
const streamerId = params.get('user');
if (streamerId) setupOverlaySocketRoom(socket, streamerId);

const DEFAULT_PIC = 'https://cdn.pixabay.com/photo/2015/10/05/22/37/blank-profile-picture-973460_960_720.png';
let ranking = {};

function hex(x, fallback) {
    if (!x || typeof x !== 'string') return fallback;
    const t = x.trim();
    if (t.startsWith('#')) return /^#[0-9a-fA-F]{6}$/.test(t) ? t : fallback;
    return /^[0-9a-fA-F]{6}$/.test(t) ? '#' + t : fallback;
}

function safeCoinColor(c) {
    const f = hex(typeof c === 'string' ? c : '', '#ffd700');
    return /^#[0-9a-fA-F]{6}$/.test(f) ? f : '#ffd700';
}

function defaultStyle() {
    return {
        headerTitle: 'MVP: Top 1 Donador',
        headerRainbow: false,
        hc1: '#22d3ee',
        hc2: '#06b6d4',
        hc3: '#2dd4bf',
        ng1: '#fffef5',
        ng2: '#ffe066',
        ng3: '#daa520',
        valueColor: '#e8e8ff',
        valueStroke: '#000000',
        coinColor: '#ffd700',
        coinLabel: '',
        showHeader: true,
        showCrown: true,
        showFx: true
    };
}

function styleFromParams() {
    const p = params;
    const d = defaultStyle();
    let headerTitle = d.headerTitle;
    try {
        if (p.get('htt')) headerTitle = decodeURIComponent(p.get('htt'));
    } catch (e) {}
    return {
        headerTitle,
        headerRainbow: p.get('htr') === '1',
        hc1: hex(p.get('hc1'), d.hc1),
        hc2: hex(p.get('hc2'), d.hc2),
        hc3: hex(p.get('hc3'), d.hc3),
        ng1: hex(p.get('ng1'), d.ng1),
        ng2: hex(p.get('ng2'), d.ng2),
        ng3: hex(p.get('ng3'), d.ng3),
        valueColor: hex(p.get('vc'), d.valueColor),
        valueStroke: hex(p.get('vs'), d.valueStroke),
        coinColor: hex(p.get('cc'), d.coinColor),
        coinLabel: (p.get('cl') != null ? p.get('cl') : '') || '',
        showHeader: p.get('sh') !== '0',
        showCrown: p.get('sc') !== '0',
        showFx: p.get('fx') !== '0'
    };
}

let activeStyle = styleFromParams();

function coinSvg() {
    const c = safeCoinColor(activeStyle.coinColor);
    return '<svg class="moneda" viewBox="0 0 24 24" aria-hidden="true">' +
        '<circle cx="12" cy="12" r="11" fill="' + c + '"/>' +
        '<circle cx="12" cy="12" r="5" fill="none" stroke="#fff" stroke-width="2.5"/>' +
        '</svg>';
}

function applyTop1Style(s) {
    activeStyle = Object.assign(defaultStyle(), s || {});
    const st = activeStyle;
    const root = document.documentElement;
    root.style.setProperty('--hc1', st.hc1);
    root.style.setProperty('--hc2', st.hc2);
    root.style.setProperty('--hc3', st.hc3);
    root.style.setProperty('--ng1', st.ng1);
    root.style.setProperty('--ng2', st.ng2);
    root.style.setProperty('--ng3', st.ng3);
    root.style.setProperty('--vc', st.valueColor);
    root.style.setProperty('--vs', st.valueStroke);
    root.style.setProperty('--cc', st.coinColor);

    const ht = document.getElementById('mvp-header-title');
    ht.textContent = st.headerTitle || 'MVP: Top 1 Donador';
    ht.classList.remove('mvp-header-title--rainbow', 'mvp-header-title--gradient');
    if (st.headerRainbow) {
        ht.classList.add('mvp-header-title--rainbow');
    } else {
        ht.classList.add('mvp-header-title--gradient');
    }

    document.body.classList.toggle('no-header', !st.showHeader);
    document.body.classList.toggle('no-crown', !st.showCrown);
    document.body.classList.toggle('no-fx', !st.showFx);
    actualizarTop();
}

applyTop1Style(activeStyle);

function actualizarTop() {
    const top = Object.values(ranking).sort((a, b) => b.monedas - a.monedas)[0];
    const label = (activeStyle.coinLabel || '').trim();
    const suffix = label ? ' ' + label : '';
    const inner = document.getElementById('monedas-inner');
    if (!top) {
        document.getElementById('nombre').innerText = 'Esperando...';
        inner.innerHTML = coinSvg() + ' <span>0' + suffix + '</span>';
        const imgEmpty = document.getElementById('avatar');
        imgEmpty.onerror = null;
        imgEmpty.src = DEFAULT_PIC;
        return;
    }
    document.getElementById('nombre').innerText = top.name;
    const img = document.getElementById('avatar');
    img.onerror = function () {
        this.onerror = null;
        this.src = DEFAULT_PIC;
    };
    img.src = top.pic || DEFAULT_PIC;
    inner.innerHTML = coinSvg() + ' <span>' + top.monedas.toLocaleString('es-ES') + suffix + '</span>';
}

function pickGiftAvatar(d) {
    const u = (d.profilePictureUrl || '').trim();
    if (u) return u;
    const urls = d.userDetails && d.userDetails.profilePictureUrls;
    if (Array.isArray(urls) && urls[0]) return String(urls[0]).trim();
    return '';
}

socket.on('gift', (data) => {
    if (data.repeatEnd || data.giftType !== 1) {
        const id = data.uniqueId || 'user';
        const coins = (data.diamondCount || 0) * (data.repeatCount || 1);
        if (coins > 0) {
            if (!ranking[id]) {
                ranking[id] = {
                    name: (data.nickname || '').trim() || id,
                    monedas: 0,
                    pic: pickGiftAvatar(data)
                };
            } else {
                if (!ranking[id].pic && pickGiftAvatar(data)) ranking[id].pic = pickGiftAvatar(data);
                if (ranking[id].name === id && (data.nickname || '').trim()) {
                    ranking[id].name = (data.nickname || '').trim();
                }
            }
            ranking[id].monedas += coins;
            actualizarTop();
        }
    }
});

socket.on('nuevo_live', () => {
    ranking = {};
    actualizarTop();
});

window.addEventListener('message', (event) => {
    const d = event && event.data;
    if (!d) return;
    if (d.type === 'top1_style' && d.style) {
        applyTop1Style(d.style);
        return;
    }
    if (d.type !== 'overlay_test' || d.kind !== 'top1') return;
    ranking['mvp_preview'] = {
        name: 'Top Preview',
        monedas: 9999,
        pic: 'https://randomuser.me/api/portraits/men/32.jpg'
    };
    actualizarTop();
});
</script>
</body>
</html>
